<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <section class="form-section">
        <form class="form">
        <h1 class="details">CONTACT US</h1>
  
        <div class="details-section">
            <div id="first" class="details-name"> 
                <label>First Name:</label>
                <input type="" placeholder="">
            </div>
        </div>
        <div class="details-section">
            <div id="last" class="details-last"> 
                <label>Last Name:</label>
                <input type="text" placeholder="">
            </div>
        </div>
        <div class="details-section">
            <div id="contact" class="details-number"> 
                <label>Contact Number:</label>
                <input type="Number" placeholder="">
            </div>
        </div>
        <div class="details-section">
            <div id="email" class="details-address"> 
                <label>Email Address:</label>
                <input type="" placeholder="">
            </div>
        </div>
        <div id="place" class="details-section">
            <div class="details-location"> 
               <label>Location:</label>
                <input type="" placeholder="">
            </div>
        </div>
        <button onclass="btn">submit</button>
        </form>
    </section>
    <script src="./script.js"></script>
</body>
</html>
